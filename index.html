<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyTube</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
height:55px;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
border-bottom:1px solid #ddd;
z-index:100;
}

.logo{
font-size:22px;
font-weight:bold;
color:red;
}

.icon{
border:none;
background:none;
font-size:20px;
cursor:pointer;
}

#screen{
margin-top:55px;
margin-bottom:65px;
}

.card{
padding:10px;
cursor:pointer;
}

.thumb{
width:100%;
height:220px;
background-size:cover;
background-position:center;
border-radius:10px;
background-color:#eee;
}

.title{
margin-top:8px;
font-weight:bold;
font-size:15px;
}

.channel{
font-size:12px;
color:#666;
margin-top:4px;
}

nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:60px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #ddd;
}

.tab{
text-align:center;
font-size:12px;
cursor:pointer;
}

.tab i{
display:block;
font-size:18px;
margin-bottom:3px;
}

.active{
color:red;
}
</style>
</head>
<body>

<header>
<div class="logo">MyTube</div>
<button class="icon" onclick="searchVideo()">
<i class="fas fa-search"></i>
</button>
</header>

<div id="screen"></div>

<nav>
<div class="tab active" onclick="home()">
<i class="fas fa-home"></i>
Home
</div>

<div class="tab" onclick="loadShorts()">
<i class="fas fa-play"></i>
Shorts
</div>

<div class="tab">
<i class="fas fa-folder"></i>
Library
</div>
</nav>

<script>
const API_KEY="AIzaSyDMI6S9ou1Mx7ChMoOYjrUqVe---OZKSzY";

const screen=document.getElementById("screen");

async function home(){

screen.innerHTML="Loading...";

try{

const url=
`https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=IN&maxResults=25&key=${API_KEY}`;

const res=await fetch(url);
const data=await res.json();

screen.innerHTML="";

(data.items||[]).forEach(v=>{

screen.innerHTML+=`
<div class="card" onclick="openPlayer('${v.id}')">

<div class="thumb"
style="background-image:url('${v.snippet.thumbnails.high.url}')">
</div>

<div class="title">${v.snippet.title}</div>

<div class="channel">${v.snippet.channelTitle}</div>

</div>
`;

});

}catch(e){
screen.innerHTML="Error Loading Videos";
}
}

async function loadSearch(q){

screen.innerHTML="Searching...";

try{

const url=
`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=25&q=${encodeURIComponent(q)}&key=${API_KEY}`;

const res=await fetch(url);
const data=await res.json();

screen.innerHTML="";

(data.items||[]).forEach(v=>{

screen.innerHTML+=`
<div class="card" onclick="openPlayer('${v.id.videoId}')">

<div class="thumb"
style="background-image:url('${v.snippet.thumbnails.high.url}')">
</div>

<div class="title">${v.snippet.title}</div>

<div class="channel">${v.snippet.channelTitle}</div>

</div>
`;

});

}catch(e){
screen.innerHTML="Search Error";
}
}

function searchVideo(){
const q=prompt("Search Video");
if(q) loadSearch(q);
}

function openPlayer(id){
location.href="player.html?vid="+id;
}

async function loadShorts(){

screen.innerHTML="Loading Shorts...";

try{

const url=
`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=20&q=shorts&key=${API_KEY}`;

const res=await fetch(url);
const data=await res.json();

screen.innerHTML="";

(data.items||[]).forEach(v=>{

screen.innerHTML+=`
<div class="card" onclick="openPlayer('${v.id.videoId}')">

<div class="thumb"
style="background-image:url('${v.snippet.thumbnails.high.url}')">
</div>

<div class="title">${v.snippet.title}</div>

<div class="channel">${v.snippet.channelTitle}</div>

</div>
`;

});

}catch(e){
screen.innerHTML="Shorts Error";
}
}

home();
</script>

</body>
</html>
